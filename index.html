<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎮 Cumple Minecraft - Gael</title>

<!-- 🟢 PREVIEW WHATSAPP -->
<meta property="og:title" content="🎮 Estás invitado al cumple de Gael">
<meta property="og:description" content="⛏️ Jugá, desbloqueá y confirmá tu asistencia 🎂">
<meta property="og:image" content="https://angel-097-ux.github.io/CUMPLE-GAEL/preview.jpg">
<meta property="og:url" content="https://angel-097-ux.github.io/CUMPLE-GAEL/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:monospace;
    color:white;
    overflow:hidden;
}

/* START */
#startScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:20;
}

#startScreen h1{
    color:#00ff00;
    font-size:clamp(20px,6vw,40px);
    animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0;}}

/* VIDEO */
video{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    filter:brightness(0.4);
}

/* CARD */
.container{
    position:absolute;
    width:100%;
    max-width:420px;
    left:50%;
    top:55%;
    transform:translate(-50%, -50%);
    padding:15px;
}

.card{
    padding:18px;
    background:rgba(0,0,0,0.85);
    border:2px solid #00ff00;
    box-shadow:0 0 20px #00ff00;
    border-radius:10px;
    text-align:center;
}

.card p{
    font-size:clamp(14px,4vw,18px);
    margin:6px 0;
}

/* BOTONES */
button{
    width:100%;
    padding:14px;
    margin:6px 0;
    font-size:16px;
    background:#006600;
    color:white;
    border:none;
    border-radius:6px;
}

.whatsapp{
    background:#25D366;
    color:black;
    font-weight:bold;
}

/* CONTADOR */
#contador{
    margin-top:10px;
    color:#00ffcc;
    font-weight:bold;
}

/* PROGRESO */
#barra{
    width:100%;
    height:12px;
    background:#222;
    margin:10px 0;
    border-radius:5px;
}
#progreso{
    height:100%;
    width:0%;
    background:#00ff00;
    border-radius:5px;
}

/* BLOQUES */
.block{
    width:70px;
    height:70px;
    background:#8B4513;
    position:absolute;
    border:2px solid black;
}

/* FINAL */
#win{
    display:none;
    position:fixed;
    width:90%;
    max-width:350px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    padding:20px;
    border:3px solid gold;
    text-align:center;
    box-shadow:0 0 30px gold;
    border-radius:10px;
    z-index:10;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
<h1>🎮 PRESS START 🎮</h1>
<button onclick="start()">INICIAR</button>
</div>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
<source src="video-steve.mp4">
</video>

<!-- CARD -->
<div class="container">
<div class="card">
<p>🧒 GAEL CUMPLE 7 AÑOS</p>
<p>📍 PIKARDIAS</p>
<p>📌 ARISTÓBULO DEL VALLE 5424</p>
<p>📅 9 DE MAYO</p>
<p>⏰ 14:00 A 16:30</p>

<div id="contador"></div>

<div id="barra"><div id="progreso"></div></div>

<button onclick="playMusic()">🎵 Música</button>
<button onclick="openMap()">📍 Ubicación</button>
<button onclick="startGame()">⛏️ Jugar</button>
</div>
</div>

<!-- AUDIO -->
<audio id="music" loop>
<source src="minecraft.mp3">
</audio>

<!-- FINAL -->
<div id="win">
<h2>🏆 INVITACIÓN DESBLOQUEADA</h2>

<p>🎂 Cumple de Gael</p>
<p>📅 9 de Mayo</p>
<p>📍 Pikardias</p>
<p>⏰ 14:00 a 16:30</p>

<button onclick="openMap()">📍 Ver ubicación</button>

<button class="whatsapp" onclick="sendWhatsApp()">
💬 Confirmar por WhatsApp
</button>
</div>

<script>

// 🔥 CONFIGURAR
const telefono="549XXXXXXXXXX";

// START
function start(){
document.getElementById("startScreen").style.display="none";
}

// MUSICA
function playMusic(){
document.getElementById("music").play();
}

// MAPA
function openMap(){
window.open("https://www.google.com/maps/search/?api=1&query=Aristóbulo+del+Valle+5424");
}

// CONTADOR
const fecha=new Date("May 9, 2026 14:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let diff=fecha-now;

if(diff<=0){
document.getElementById("contador").innerHTML="🎉 ¡ES HOY!";
return;
}

let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((diff%(1000*60*60))/(1000*60));
let s=Math.floor((diff%(1000*60))/1000);

document.getElementById("contador").innerHTML=
`⏳ ${d}D ${h}H ${m}M ${s}S`;
},1000);

// JUEGO
let total=6,count=0;

function startGame(){
count=0;
updateBar();

for(let i=0;i<total;i++){
let b=document.createElement("div");
b.className="block";
b.style.left=Math.random()*80+"vw";
b.style.top=Math.random()*70+"vh";

b.onclick=function(){
b.remove();
count++;
updateBar();
if(count>=total){winGame();}
};

document.body.appendChild(b);
}
}

function updateBar(){
document.getElementById("progreso").style.width=(count/total*100)+"%";
}

// GANAR
function winGame(){
document.getElementById("win").style.display="block";
}

// WHATSAPP
function sendWhatsApp(){
const msg=encodeURIComponent("🎮 Confirmo asistencia al cumple de Gael 🎂 el 9 de Mayo");
window.open(`https://wa.me/${telefono}?text=${msg}`);
}

</script>

</body>
</html>
