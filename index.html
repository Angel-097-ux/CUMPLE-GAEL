<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎮 Cumple Gael - NIVEL DIOS 5.0</title>

<meta property="og:image" content="https://angel-097-ux.github.io/CUMPLE-GAEL/preview.jpg">

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
cursor: url('cursor.png') 16 16, auto;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:50;
font-size:20px;
}

/* VIDEO */
video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.45);
z-index:-2;
display:none;
}

/* CONTENEDOR */
.main{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:380px;
display:flex;
flex-direction:column;
gap:15px;
}

/* CARD */
.card{
background:rgba(0,0,0,0.65);
padding:18px;
border-radius:14px;
text-align:center;
}

/* BOTONES */
button{
width:100%;
padding:13px;
margin-top:6px;
background:#2e7d32;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
}

/* CONTADOR */
#contador{color:#8affc1;margin-top:8px}

/* PROGRESO */
#barra{width:100%;height:8px;background:#222;margin-top:10px}
#progreso{height:100%;width:0;background:#4caf50}

/* BLOQUES */
.block{
width:65px;
height:65px;
background:#6b4f2a;
position:absolute;
}

/* CREEPER */
#creeper{
position:absolute;
bottom:0;
left:-100px;
width:60px;
height:60px;
background:#3cff00;
z-index:5;
}

#creeper::before{
content:"";
position:absolute;
width:10px;
height:10px;
background:black;
top:15px;
left:8px;
box-shadow:25px 0 black,12px 20px black;
}

/* EXPLOSION */
#explosion{
position:absolute;
width:160px;
height:160px;
border-radius:50%;
background:radial-gradient(circle,#fff,orange,red,transparent);
display:none;
z-index:10;
animation:boom 0.5s ease-out;
box-shadow:0 0 80px orange,0 0 150px red;
}

@keyframes boom{
0%{transform:scale(0.2);opacity:1;}
100%{transform:scale(3);opacity:0;}
}

/* FINAL */
#win{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
padding:25px;
border-radius:12px;
text-align:center;
z-index:20;
}
</style>
</head>

<body>

<div id="loader">⏳ Cargando mundo Minecraft...</div>

<video id="bgVideo" autoplay muted loop playsinline>
<source src="video-steve.mp4">
</video>

<div class="main">

<div class="card">
<h2>🎂 GAEL CUMPLE 7</h2>
<p>📍 Pikardias</p>
<p>📌 Aristóbulo del Valle 5424</p>
<p>📅 9 de Mayo</p>
<p>⏰ 14:00 - 16:30</p>

<div id="contador"></div>
<div id="barra"><div id="progreso"></div></div>
</div>

<div class="card">
<button onclick="startGame()">⛏️ Jugar</button>
<button onclick="openMap()">📍 Ubicación</button>
<button onclick="playMusic()">🎵 Música</button>
</div>

</div>

<audio id="music" loop src="minecraft.mp3"></audio>
<audio id="hiss" src="hiss.mp3"></audio>
<audio id="boom" src="boom.mp3"></audio>

<div id="creeper"></div>
<div id="explosion"></div>

<div id="win">
<h2>🏆 MISIÓN COMPLETADA</h2>
<p>🎂 Cumple de Gael</p>
<p>📅 9 de Mayo</p>
<button onclick="wa()">💬 Confirmar asistencia</button>
</div>

<script>

// LOAD
window.onload=()=>{
loader.style.display="none";
bgVideo.style.display="block";
};

// DATA
const telefono="5493426112097";

// CONTADOR
const fecha=new Date("May 9, 2026 14:00:00").getTime();
setInterval(()=>{
let diff=fecha-new Date().getTime();
let d=Math.floor(diff/86400000);
let h=Math.floor(diff%86400000/3600000);
let m=Math.floor(diff%3600000/60000);
let s=Math.floor(diff%60000/1000);
contador.innerHTML=`⏳ ${d}D ${h}H ${m}M ${s}S`;
},1000);

// GAME
let total=5,count=0;

function startGame(){
count=0;
update();

for(let i=0;i<total;i++){
let b=document.createElement("div");
b.className="block";
b.style.left=Math.random()*80+"vw";
b.style.top=Math.random()*70+"vh";

b.onclick=()=>{
b.remove();
count++;
update();
if(count>=total){creeperAttack();}
};

document.body.appendChild(b);
}
}

function update(){
progreso.style.width=(count/total*100)+"%";
}

// 💣 CREEPER CINEMATIC
function creeperAttack(){
let c=creeper;
let e=explosion;

hiss.play(); // sssss

c.style.left="50%";
c.style.transform="translateX(-50%)";

setTimeout(()=>{

let r=c.getBoundingClientRect();

boom.play();

e.style.left=r.left+"px";
e.style.top=r.top+"px";
e.style.display="block";

// vibración
if(navigator.vibrate){
navigator.vibrate([300,100,400]);
}

// shake
document.body.style.transform="translate(8px,-8px)";
setTimeout(()=>document.body.style.transform="translate(-8px,8px)",100);
setTimeout(()=>document.body.style.transform="translate(0,0)",200);

// flash
document.body.style.background="white";
setTimeout(()=>document.body.style.background="black",120);

setTimeout(()=>{
c.style.display="none";
e.style.display="none";
win.style.display="block";
},600);

},1800);
}

// FUNCIONES
function openMap(){
window.open("https://www.google.com/maps/search/?api=1&query=Aristóbulo+del+Valle+5424");
}

function playMusic(){
music.play();
}

function wa(){
window.open(`https://wa.me/${3426112097}?text=Confirmo asistencia al cumple de Gael 🎮`);
}

</script>

</body>
</html>
